<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pregunta seria</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .box {
            background: #1c1c1c;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(255,0,0,0.3);
        }

        h1 {
            color: #ff4d4d;
        }

        p {
            font-size: 18px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Pregunta random 🤔</h1>
        <p>¿Qué haces viendo esto?</p>
        <p>¿No que te olvidaste rápido de mí?</p>
        <p><strong>Más loca 😵‍💫</strong></p>
    </div>
</body>
</html>
